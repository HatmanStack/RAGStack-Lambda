name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  FORCE_COLOR: 1

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ui: ${{ steps.filter.outputs.ui }}
      chat: ${{ steps.filter.outputs.chat }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v3
        id: filter
        with:
          filters: |
            backend:
              - 'lib/**'
              - 'src/lambda/**'
              - 'tests/**'
              - 'requirements.txt'
            ui:
              - 'src/ui/**'
            chat:
              - 'src/ragstack-chat/**'

  backend:
    name: Backend Lint & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    env:
      AWS_DEFAULT_REGION: us-east-1
      PYTHONPATH: ${{ github.workspace }}/lib
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format . --check

      - name: Vulture dead code check
        run: uvx vulture lib/ src/lambda/ vulture_whitelist.py --min-confidence 90

      - name: Mypy type check
        run: uv run mypy lib/ src/lambda/

      - name: Tests with coverage
        run: uv run pytest tests/unit/python/ -m 'not integration' -v --tb=short --cov=lib --cov=src/lambda --cov-fail-under=60

  ui:
    name: UI Lint & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/ui/package-lock.json

      - name: Install dependencies
        working-directory: ./src/ui
        run: npm ci

      - name: Lint
        working-directory: ./src/ui
        run: npm run lint

      - name: Tests
        working-directory: ./src/ui
        run: npm test

  chat:
    name: RagStack Chat Lint, Typecheck & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.chat == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/ragstack-chat/package-lock.json

      - name: Install dependencies
        working-directory: ./src/ragstack-chat
        run: npm ci

      - name: Setup generated config for CI
        run: cp src/ragstack-chat/src/amplify-config.template.ts src/ragstack-chat/src/amplify-config.generated.ts

      - name: Lint
        working-directory: ./src/ragstack-chat
        run: npm run lint

      - name: Type check
        working-directory: ./src/ragstack-chat
        run: npx tsc --noEmit

      - name: Tests
        working-directory: ./src/ragstack-chat
        run: npm test

