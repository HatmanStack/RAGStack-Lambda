name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'

env:
  CI: true
  FORCE_COLOR: 1

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ui: ${{ steps.filter.outputs.ui }}
      chat: ${{ steps.filter.outputs.chat }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            backend:
              - 'lib/**'
              - 'src/lambda/**'
              - 'tests/**'
              - 'requirements.txt'
            ui:
              - 'src/ui/**'
            chat:
              - 'src/ragstack-chat/**'

  backend:
    name: Backend Lint & Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    env:
      AWS_DEFAULT_REGION: us-east-1
      PYTHONPATH: ${{ github.workspace }}/lib
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format . --check

      - name: Vulture dead code check
        run: uvx vulture lib/ src/lambda/ vulture_whitelist.py --min-confidence 90

      - name: Mypy type check
        run: uv run mypy lib/ src/lambda/

      - name: Tests
        run: uv run pytest tests/unit/python/ -m 'not integration' -v --tb=short

  ui:
    name: UI Lint & Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/ui/package-lock.json

      - name: Install dependencies
        working-directory: ./src/ui
        run: npm ci

      - name: Lint
        working-directory: ./src/ui
        run: npm run lint

      - name: Tests
        working-directory: ./src/ui
        run: npm test

  chat:
    name: RagStack Chat Lint, Typecheck & Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.chat == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/ragstack-chat/package-lock.json

      - name: Install dependencies
        working-directory: ./src/ragstack-chat
        run: npm ci

      - name: Setup generated config for CI
        run: cp src/ragstack-chat/src/amplify-config.template.ts src/ragstack-chat/src/amplify-config.generated.ts

      - name: Lint
        working-directory: ./src/ragstack-chat
        run: npm run lint

      - name: Type check
        working-directory: ./src/ragstack-chat
        run: npx tsc --noEmit

      - name: Tests
        working-directory: ./src/ragstack-chat
        run: npm test

  status-check:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [backend, ui, chat]
    if: always()
    steps:
      - name: Verify
        run: |
          results=(
            "${{ needs.backend.result }}"
            "${{ needs.ui.result }}"
            "${{ needs.chat.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more checks failed: $result"
              exit 1
            fi
          done
          echo "All checks passed!"
